name = "wcb"
pages_build_output_dir = "public"
compatibility_date = "2024-11-01"

# KV namespace holding access keys, bets and cached results.
# Create it once with:  npx wrangler kv namespace create WCB
# then paste the returned id below. Local `wrangler pages dev` uses a local
# simulated KV and ignores this id.
[[kv_namespaces]]
binding = "WCB"
id = "15143677750f424f9a71ea66ce8e0fc2"

[vars]
# Submissions lock at this instant. 2026-06-11 16:00 Europe/Helsinki = 13:00 UTC.
DEADLINE = "2026-06-11T13:00:00Z"

# Secret (NOT stored here):
#   ADMIN_KEY - gate for /api/admin/* and admin.html
# Local dev: put it in .dev.vars (gitignored).
# Production: `npx wrangler pages secret put ADMIN_KEY`.
